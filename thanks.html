<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | アクタレント株式会社</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .thanks {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--warm);
      text-align: center;
      padding: 24px;
    }
    .thanks-card {
      max-width: 520px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 60px 48px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .thanks-card h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 16px;
      color: var(--green);
    }
    .thanks-card p {
      font-size: 0.92rem;
      color: var(--text-mid);
      line-height: 1.85;
      margin-bottom: 32px;
    }
    .thanks-back {
      display: inline-block;
      background: var(--green);
      color: var(--white);
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      transition: var(--transition);
    }
    .thanks-back:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="thanks">
    <div class="thanks-card">
      <h1>送信ありがとうございます</h1>
      <p>内容を確認のうえ、2営業日以内にご連絡いたします。<br>しばらくお待ちください。</p>
      <a href="index.html" class="thanks-back">トップに戻る</a>
    </div>
  </div>
</body>

</html>
